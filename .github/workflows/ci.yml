name: CI

on:
  push:
    branches:
      - main
      - Python-3
  pull_request:
    branches:
      - main
      - Python-3

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Check Python syntax
        run: python -m compileall backend

      - name: Lint (flake8)
        run: |
          pip install flake8
          # Keep lint settings inline so CI doesn't fail if .flake8 is absent on older commits/branches.
          flake8 --max-line-length=200 --extend-ignore=E302,E303,E305,E306,E231,E252,F401,F841,W391
