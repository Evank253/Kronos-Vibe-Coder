<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kronos Vibe Dashboard</title>
    <link rel="stylesheet" href="/static/vibe-3d.css" />
  </head>
  <body>
    <div class="layout">
      <section class="stage">
        <canvas id="scene"></canvas>
      </section>
      <aside class="sidebar">
        <h1>Vibe Dashboard</h1>
        <p>Swarm agents, live scan telemetry, and a mobile-safe 2D fallback renderer.</p>
        <div class="metric-grid">
          <div class="card"><strong id="issuesRemaining">0</strong><br />Issues remaining</div>
          <div class="card"><strong id="fixesApplied">0</strong><br />Fixes applied</div>
          <div class="card"><strong id="agentsCompleted">0</strong><br />Agents complete</div>
          <div class="card"><strong id="taskStatus">idle</strong><br />Task status</div>
        </div>
        <button id="startScan">Start Scan &amp; Fix</button>
        <button id="deployBtn">Deploy merged result</button>
        <div id="agents"></div>
        <div id="timeline"></div>
      </aside>
    </div>
    <script src="/static/lib/three.min.js"></script>
    <script src="/static/lib/gsap.min.js"></script>
    <script src="/static/lib/vibe-3d.js"></script>
    <script src="/static/js/vibe-websocket.js"></script>
    <script>
      const scene = new window.VibeScene(document.getElementById('scene'));
      let activeTaskId = new URLSearchParams(location.search).get('task_id');

      function renderSnapshot(snapshot){
        document.getElementById('issuesRemaining').innerText = snapshot.summary?.issues_remaining ?? 0;
        document.getElementById('fixesApplied').innerText = snapshot.summary?.fixes_applied ?? 0;
        document.getElementById('agentsCompleted').innerText = snapshot.summary?.agents_completed ?? 0;
        document.getElementById('taskStatus').innerText = snapshot.status || 'idle';
        scene.update(snapshot);

        const agents = document.getElementById('agents');
        agents.innerHTML = '<h3>Agent activity</h3>';
        Object.values(snapshot.agent_results || {}).forEach(agent => {
          const card = document.createElement('div');
          card.className = 'agent-card';
          card.innerHTML = `<strong>${agent.agent}</strong><br />${agent.status}<br />${agent.issue_count} issues`;
          agents.appendChild(card);
        });

        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '<h3>Timeline</h3>';
        (snapshot.events || []).slice(-6).forEach(event => {
          const row = document.createElement('div');
          row.className = 'timeline-item';
          row.innerHTML = `<strong>${event.stage}</strong><br />${event.message}`;
          timeline.appendChild(row);
        });
      }

      function attachTask(taskId){
        activeTaskId = taskId;
        window.connectVibe(taskId, renderSnapshot);
      }

      document.getElementById('startScan').onclick = async function(){
        const response = await fetch('/vibe/scan-and-fix', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({path: '.'})
        });
        const payload = await response.json();
        attachTask(payload.task_id);
      };

      document.getElementById('deployBtn').onclick = async function(){
        if(!activeTaskId) return alert('Start a task first');
        const response = await fetch('/vibe/merge-results', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({task_id: activeTaskId, write_files: false})
        });
        const payload = await response.json();
        alert(`Merged ${payload.merged_result.files.length} files`);
      };

      if(activeTaskId){
        attachTask(activeTaskId);
      }
    </script>
  </body>
</html>
