services:
  kronos-api:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-change-me}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
